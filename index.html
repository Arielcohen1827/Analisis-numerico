<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propagación de Error V2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.4.2/math.min.js"></script>

<script>
window.MathJax = {
  tex:{inlineMath:[['$','$'],['\\(','\\)']]}
};
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>

<body class="bg-slate-100 min-h-screen">

<div class="max-w-6xl mx-auto p-6">

<div class="flex justify-between items-center mb-6">
<h1 class="text-3xl font-bold">Calculadora de Propagación de Error V2</h1>
<button id="themeBtn" class="px-4 py-2 bg-slate-800 text-white rounded">🌙 Modo oscuro</button>
</div>

<div id="alert" class="hidden p-4 rounded mb-4"></div>

<div class="bg-white rounded-xl shadow p-6">
<label class="font-semibold">Función</label>
<input id="funcion" class="w-full border p-3 rounded mt-2"
placeholder="Ej: x^2*sin(y)+ln(z)">

<div class="mt-4 bg-slate-50 p-4 rounded">
<div class="text-sm text-slate-500">Vista previa</div>
<div id="preview">\(f(x)\)</div>
</div>

<div id="variables" class="grid md:grid-cols-3 gap-4 mt-6"></div>

<div class="flex gap-3 mt-6">
<button id="calcBtn" class="bg-blue-600 text-white px-5 py-3 rounded">
Calcular
</button>

<button id="pdfBtn" class="bg-green-600 text-white px-5 py-3 rounded">
Guardar resultado
</button>
</div>
</div>

<div id="resultado" class="hidden mt-6 bg-white rounded-xl shadow p-6"></div>

<div class="mt-6 bg-white rounded-xl shadow p-6">
<h2 class="font-bold text-xl mb-3">Historial</h2>
<ul id="history"></ul>
</div>

</div>

<script>

const RESERVED=[
'sin','cos','tan','asin','acos','atan',
'log','ln','sqrt','exp','abs','pi','e'
];

function showError(msg){
 const a=document.getElementById('alert');
 a.className='p-4 rounded mb-4 bg-red-100 text-red-700';
 a.textContent=msg;
 a.classList.remove('hidden');
}

function clearError(){
 document.getElementById('alert').classList.add('hidden');
}

function extractVariables(expr){

 const tokens=(expr.match(/[a-zA-Z]+/g)||[])
 .filter(v=>!RESERVED.includes(v.toLowerCase()));

 return [...new Set(tokens)];
}

function renderInputs(){

 const expr=document.getElementById('funcion').value;
 const vars=extractVariables(expr);

 const cont=document.getElementById('variables');
 cont.innerHTML='';

 vars.forEach(v=>{

   cont.innerHTML+=`
   <div class="border rounded p-4">
     <h3 class="font-bold mb-2">${v}</h3>

     <input type="number" step="any"
       id="val_${v}"
       placeholder="Valor ${v}"
       class="w-full border p-2 rounded mb-2">

     <input type="number" step="any"
       id="err_${v}"
       placeholder="Δ${v}"
       class="w-full border p-2 rounded">
   </div>
   `;
 });

}

function updatePreview(){

 const expr=document.getElementById('funcion').value;

 document.getElementById('preview').innerHTML=
 `\\[${expr||'f(x)'}\\]`;

 renderInputs();

 if(window.MathJax){
   MathJax.typesetPromise();
 }
}

document.getElementById('funcion')
.addEventListener('input',updatePreview);

updatePreview();

function saveHistory(expr){

 let h=JSON.parse(localStorage.getItem('pe_history')||'[]');

 if(!h.includes(expr)){
   h.unshift(expr);
 }

 h=h.slice(0,10);

 localStorage.setItem('pe_history',JSON.stringify(h));

 loadHistory();
}

function loadHistory(){

 const ul=document.getElementById('history');

 let h=JSON.parse(localStorage.getItem('pe_history')||'[]');

 ul.innerHTML='';

 h.forEach(item=>{

 ul.innerHTML+=`
 <li class="flex justify-between border-b py-2">
   <span>${item}</span>
   <button onclick="reuseHistory('${item}')"
   class="text-blue-600">
   Reutilizar
   </button>
 </li>`;

 });

}

function reuseHistory(expr){

 document.getElementById('funcion').value=expr;
 updatePreview();
}

loadHistory();

document.getElementById('calcBtn')
.addEventListener('click',()=>{

 clearError();

 const expr=document.getElementById('funcion').value.trim();

 if(!expr){
   showError('Ingrese una función.');
   return;
 }

 try{
   math.parse(expr);
 }
 catch{
   showError('Expresión matemática inválida. Por favor, revise la sintaxis');
   return;
 }

 const vars=extractVariables(expr);

 let scope={};
 let delta=0;

 let derivadas='';

 try{

   vars.forEach(v=>{

     const val=parseFloat(document.getElementById('val_'+v).value);
     const err=parseFloat(document.getElementById('err_'+v).value);

     if(isNaN(val)||isNaN(err)||err<=0){
        throw new Error('datos');
     }

     scope[v]=val;

   });

   const f=math.evaluate(expr,scope);

   vars.forEach(v=>{

      const err=parseFloat(document.getElementById('err_'+v).value);

      const d=math.derivative(expr,v);

      const evald=d.evaluate(scope);

      delta+=Math.abs(evald)*err;

      derivadas+=`
      <div class="mb-4">
      \\[
      \\frac{\\partial f}{\\partial ${v}}
      =
      ${d.toString()}
      \\]

      \\[
      ${evald}
      \\]
      </div>`;
   });

   const rho=delta/Math.abs(f);
   const porcentaje=rho*100;

   document.getElementById('resultado').innerHTML=`
   <h2 class="text-2xl font-bold mb-4">Resultados</h2>

   <div class="mb-4">
   <strong>Valor de la función:</strong>
   \\[f=${f}\\]
   </div>

   <div>
   <h3 class="font-bold">Derivadas parciales</h3>
   ${derivadas}
   </div>

   <div class="bg-blue-50 p-4 rounded">
   \\[
   \\Delta f=${delta}
   \\]

   \\[
   f=${f}\\pm${delta}
   \\]

   \\[
   \\rho_f=${rho}
   \\]

   \\[
   \\delta\\%=${porcentaje}
   \\]
   </div>
   `;

   document.getElementById('resultado')
   .classList.remove('hidden');

   saveHistory(expr);

   MathJax.typesetPromise();

 }
 catch(e){

   showError(
   'Error: Ingrese solo números válidos en los campos de variables y cotas de error'
   );

 }

});

document.getElementById('pdfBtn')
.addEventListener('click',()=>{

 const content=document.getElementById('resultado').innerText;

 const blob=new Blob([content],{type:'text/plain'});

 const a=document.createElement('a');

 a.href=URL.createObjectURL(blob);
 a.download='resultado_propagacion_error.txt';
 a.click();

});

document.getElementById('themeBtn')
.addEventListener('click',()=>{

 document.body.classList.toggle('bg-slate-900');
 document.body.classList.toggle('text-white');

});

</script>
</body>
</html>
